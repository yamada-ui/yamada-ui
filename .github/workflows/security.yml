name: Security

on:
  pull_request:
    paths:
      - ".github/**/*.yml"
      - ".github/**/*.yaml"
    branches:
      - main
      - v*

jobs:
  pinact:
    name: Pinact
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run pinact
        uses: suzuki-shunsuke/pinact-action@3d49c6412901042473ffa78becddab1aea46bbea # v1.3.1
        with:
          skip_push: true
