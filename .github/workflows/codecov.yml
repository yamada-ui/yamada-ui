name: Codecov

on:
  push:
    branches:
      - main

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  coverage:
    name: Coverage ${{ matrix.shard_index }}/4
    runs-on: ubuntu-24.04
    strategy:
      max-parallel: 4
      matrix:
        shard_index: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Setup Browser
        working-directory: packages/react
        run: pnpm playwright install chromium --with-deps

      - name: Run coverage
        run: pnpm test:coverage -- --shard=${{ matrix.shard_index }}/4

      - name: Upload coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          disable_search: true
          fail_ci_if_error: false
          files: ./packages/react/coverage/coverage-final.json,./packages/utils/coverage/coverage-final.json,./packages/cli/coverage/coverage-final.json
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          codecov_yml_path: ./codecov.yml
