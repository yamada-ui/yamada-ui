name: Unit Test

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      TURBO_TOKEN:
        required: false
      CODECOV_TOKEN:
        required: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      matrix:
        include:
          - id: cli
            name: CLI
            file_yaml: |
              full:
                - .github/workflows/quality.yml
                - '{turbo.json,package.json}'
                - packages/workspace/package.json
                - packages/workspace/src/vitest/**
                - packages/cli/{package.json,vitest.config.ts}
                - packages/cli/test/**
              diff:
                - packages/cli/src/**/*.{ts,tsx,mts}
          - id: utils
            name: Utils
            file_yaml: |
              full:
                - .github/workflows/quality.yml
                - '{turbo.json,package.json}'
                - packages/workspace/package.json
                - packages/workspace/src/vitest/**
                - packages/utils/{package.json,vitest.config.ts}
              diff:
                - packages/utils/src/**/*.{ts,tsx,mts}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Check modified files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_yaml: ${{ matrix.file_yaml }}

      - name: Install
        if: steps.changed-files.outputs.changed_keys != ''
        uses: ./.github/composite-actions/install

      - name: Run test (full)
        if: steps.changed-files.outputs.full_any_changed == 'true'
        run: pnpm turbo run test:coverage --filter=./packages/${{ matrix.id }}

      - name: Run test (diff)
        if: steps.changed-files.outputs.full_any_changed != 'true' && steps.changed-files.outputs.diff_any_changed == 'true'
        run: pnpm turbo run test:coverage --filter=./packages/${{ matrix.id }} -- --changed origin/${{ github.base_ref }}

      - name: Upload coverage
        if: steps.changed-files.outputs.changed_keys != ''
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          disable_search: true
          fail_ci_if_error: false
          files: ./packages/${{ matrix.id }}/coverage/coverage-final.json
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          codecov_yml_path: ./codecov.yml
