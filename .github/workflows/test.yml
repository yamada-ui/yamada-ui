name: Test

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      TURBO_TOKEN:
        required: false
      CODECOV_TOKEN:
        required: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  coverage_changes:
    name: Check coverage-related changes
    runs-on: ubuntu-24.04
    outputs:
      any_changed: ${{ steps.check-modified.outputs.any_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Check modified files
        id: check-modified
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46.0.5
        with:
          files: |
            turbo.json
            packages/**/(package.json|vitest.config.ts)
            packages/**/(src|test)/**/*.{ts,tsx}
            !packages/**/src/**/*.stories.{ts,tsx}
            !packages/workspace/src/**
            packages/workspace/src/vitest/**
            .github/workflows/test.yml
            .github/workflows/quality.yml

  utils_coverage:
    name: Collect utils coverage
    needs: [coverage_changes]
    if: needs.coverage_changes.outputs.any_changed == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Run coverage
        working-directory: packages/utils
        run: pnpm test:coverage

      - name: Upload coverage to GitHub Actions Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: utils-coverage
          path: packages/utils/coverage/coverage-final.json
          if-no-files-found: error
          retention-days: 1
          overwrite: true

  cli_coverage:
    name: Collect cli coverage
    needs: [coverage_changes]
    if: needs.coverage_changes.outputs.any_changed == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Run coverage
        working-directory: packages/cli
        run: pnpm test:coverage

      - name: Upload coverage to GitHub Actions Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cli-coverage
          path: packages/cli/coverage/coverage-final.json
          if-no-files-found: error
          retention-days: 1
          overwrite: true

  react_blob_reports:
    name: Generate react blob report ${{ matrix.shard_index }}/${{ matrix.shard_total }}
    needs: [coverage_changes]
    if: needs.coverage_changes.outputs.any_changed == 'true'
    runs-on: ubuntu-24.04
    strategy:
      max-parallel: 4
      matrix:
        shard_index: [1, 2, 3, 4]
        shard_total: [4]
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Setup Browser
        working-directory: packages/react
        run: pnpm playwright install chromium --with-deps

      - name: Run coverage
        working-directory: packages/react
        run: |
          pnpm vitest run \
            --browser=chromium \
            --coverage \
            --reporter=blob \
            --reporter=verbose \
            --shard=${{ matrix.shard_index }}/${{ matrix.shard_total }}

      - name: Upload blob report to GitHub Actions Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: vitest-reports-blob-${{ matrix.shard_index }}-${{ matrix.shard_total }}
          path: packages/react/.vitest-reports/*
          include-hidden-files: true
          retention-days: 1
          overwrite: true

  react_complete_coverage:
    name: Merge blob reports and generate complete react coverage
    if: needs.coverage_changes.outputs.any_changed == 'true' && needs.react_blob_reports.result == 'success'
    runs-on: ubuntu-24.04
    needs: [coverage_changes, react_blob_reports]
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/react/.vitest-reports
          pattern: vitest-reports-blob-*
          merge-multiple: true

      - name: Merge reports
        working-directory: packages/react
        run: |
          pnpm vitest run \
            --browser=chromium \
            --coverage \
            --merge-reports

      - name: Upload merged coverage to GitHub Actions Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: react-coverage
          path: packages/react/coverage/coverage-final.json
          if-no-files-found: error
          retention-days: 1
          overwrite: true

  upload-coverages:
    name: Upload coverages to Codecov
    if: needs.coverage_changes.outputs.any_changed == 'true'
    needs:
      [coverage_changes, utils_coverage, cli_coverage, react_complete_coverage]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Download utils coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: utils-coverage
          path: packages/utils/coverage

      - name: Download cli coverage from GitHub Actions Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-coverage
          path: packages/cli/coverage

      - name: Download react coverage from GitHub Actions Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: react-coverage
          path: packages/react/coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          disable_search: true
          fail_ci_if_error: false
          files: ./packages/react/coverage/coverage-final.json,./packages/utils/coverage/coverage-final.json,./packages/cli/coverage/coverage-final.json
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          codecov_yml_path: ./codecov.yml

  browser:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - id: firefox
            name: Firefox
          - id: webkit
            name: Webkit
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Check modified files
        id: check-modified
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46.0.5
        with:
          files: |
            turbo.json
            packages/**/(package.json|vitest.config.ts)
            packages/**/(src|test)/**/*.{ts,tsx}
            !packages/**/src/**/*.stories.{ts,tsx}
            !packages/workspace/src/**
            packages/workspace/src/vitest/**
            .github/workflows/test.yml
            .github/workflows/quality.yml

      - name: Restore turbo cache
        if: steps.check-modified.outputs.any_changed == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ matrix.id }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-${{ matrix.id }}-
            ${{ runner.os }}-turbo-${{ github.job }}-

      - name: Install
        if: steps.check-modified.outputs.any_changed == 'true'
        uses: ./.github/composite-actions/install

      - name: Setup Browser
        if: steps.check-modified.outputs.any_changed == 'true'
        working-directory: packages/react
        run: pnpm playwright install ${{ matrix.id }} --with-deps

      - name: Run Browser Test on ${{ matrix.id }}
        if: steps.check-modified.outputs.any_changed == 'true'
        run: pnpm test:${{ matrix.id }}
