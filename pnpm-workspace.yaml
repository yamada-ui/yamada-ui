packages:
  - "packages/**"
  - "playgrounds/**"
  - "www/**"

catalog:
  "@faker-js/faker": ^10.4.0
  "@lucide/lab": ^0.1.2
  "@testing-library/jest-dom": ^6.9.1
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  "@types/node": ^25.5.0
  "@vitejs/plugin-react": ^6.0.1
  "@vitest/ui": ^4.1.2
  clean-package: 2.2.0
  eslint: ^9.39.4
  next: ^16.2.1
  react: ^19.2.4
  react-dom: ^19.2.4
  react-hook-form: ^7.72.0
  react-icons: ^5.6.0
  typescript: ^5.9.3
  vite: ^8.0.3
  vitest: ^4.1.2
  vitest-axe: ^0.1.0
  vite-tsconfig-paths: ^6.1.1

minimumReleaseAge: 10080 # = 60 [minutes/h] * 24 [h/day] * 7 [day]

onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@swc/core"
  - "esbuild"
  - "lefthook"
  - "sharp"
  - "unrs-resolver"

blockExoticSubdeps: true

strictDepBuilds: true

dedupeDirectDeps: true
