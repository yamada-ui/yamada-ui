name: Next

on:
  push:
    paths:
      - ".changeset/**"
      - "packages/**"
      - "!packages/**/storybook/**"
      - "!packages/**/test/**"
      - "!packages/**/*.stories.ts"
      - "!packages/**/*.stories.tsx"
      - "!packages/**/*.stories.mdx"
      - "!packages/**/*.test.ts"
      - "!packages/**/*.test.tsx"
      - "!packages/**/*.test.mdx"
    branches:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Build packages
        run: pnpm build

      - name: Create @next release
        run: pnpm release:next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate @next registries
        run: |
          pnpm gen:registries --tag next
          git add .
          git diff --staged --exit-code || git commit -m 'ci(changesets): update next registries'
          git push
