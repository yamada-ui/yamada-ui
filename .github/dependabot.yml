version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Tokyo"
    cooldown:
      default-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
      include:
        - "*"
    assignees:
      - "hirotomoyamada"
    labels:
      - "dependencies"
    groups:
      awesome-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@changesets/*"
          - "oxlint"
          - "oxlint-*"
          - "eslint"
          - "*eslint-plugin*"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "storybook"
          - "@storybook/*"
          - "vitest"
          - "vitest-*"
          - "@vitest/*"
          - "@testing-library/*"
      changesets:
        patterns:
          - "@changesets/*"
      lint:
        patterns:
          - "oxlint"
          - "oxlint-*"
          - "eslint"
          - "*eslint-plugin*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
      test:
        patterns:
          - "vitest"
          - "vitest-*"
          - "@vitest/*"
          - "@testing-library/*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tsdown"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Tokyo"
    cooldown:
      default-days: 7
      include:
        - "*"
    assignees:
      - "hirotomoyamada"
    labels:
      - "github-actions"
    groups:
      awesome-actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10
