name: Observe Issues and Pull Requests

on:
  schedule:
    - cron: "0 9 * * *"

jobs:
  issue-and-pull-request:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Create or update test issues
        if: false
        run: pnpm issue:coverage
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          CODECOV_API_TOKEN: ${{ secrets.CODECOV_API_TOKEN }}

      - name: Setup Browser
        working-directory: packages/react
        run: pnpm playwright install --with-deps

      - name: Create or update a11y issues
        run: |
          pnpm react test:a11y || true
          pnpm issue:a11y --no-report
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
