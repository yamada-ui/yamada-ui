name: Quality

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_SCM_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
  NODE_OPTIONS: --max-old-space-size=8192

jobs:
  build:
    name: Build
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Build packages
        run: pnpm build --affected

  unit_test:
    name: Unit Test
    if: ${{ !github.event.pull_request.draft }}
    uses: ./.github/workflows/unit-test.yml
    secrets:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  browser_test:
    name: Browser Test
    if: ${{ !github.event.pull_request.draft }}
    uses: ./.github/workflows/browser-test.yml
    secrets:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Run lint
        run: pnpm turbo run lint --affected

  typecheck:
    name: Typecheck
    if: ${{ !github.event.pull_request.draft }}
    uses: ./.github/workflows/typecheck.yml
    secrets:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  format:
    name: Format
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Check modified files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            oxfmt.config.ts
            .github/workflows/quality.yml
            **/*.{js,cjs,mjs,jsx,ts,cts,mts,tsx,d.ts,md,mdx,yaml,yml,json,html,css}

      - name: Install
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: ./.github/composite-actions/install

      - name: Run format
        if: steps.changed-files.outputs.any_changed == 'true'
        run: pnpm format

  changeset:
    name: Changeset
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check modified files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_yaml: |
            src:
              - packages/{cli,react,utils}/src/**/*.{ts,tsx}
              - '!packages/{cli,react,utils}/src/**/*.test.{ts,tsx}'
              - '!packages/{cli,react,utils}/src/**/*.stories.{ts,tsx}'
            changeset:
              - .changeset/*.md
              - '!.changeset/README.md'

      - name: Fail if no changeset
        if: steps.changed-files.outputs.src_any_changed == 'true' && steps.changed-files.outputs.changeset_any_changed == 'false'
        run: |
          echo "::error::Changes detected in packages (cli/react/utils) but no changeset file was added."
          echo "Please run 'pnpm changeset' to generate a changeset file."
          echo ""
          echo "Modified files:"
          echo "${{ steps.changed-files.outputs.src_all_changed_files }}"
          exit 1
