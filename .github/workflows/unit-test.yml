name: Unit Test

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      TURBO_TOKEN:
        required: false
      CODECOV_TOKEN:
        required: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      matrix:
        include:
          - id: cli
            name: CLI
            script: test:coverage
            file_yaml: |
              full:
                - packages/cli/{package.json,vitest.config.ts}
                - packages/cli/test/**
              diff:
                - packages/cli/src/**/*.{ts,tsx,mts}
            coverage_final_json: coverage-final.json
          - id: react
            name: React
            script: test:coverage:jsdom
            file_yaml: |
              full:
                - packages/react/{package.json,vitest.config.ts}
                - packages/react/test/**
              diff:
                - packages/react/src/**/*.{ts,tsx,mts}
                - '!packages/react/src/**/*.stories.{ts,tsx}'
                - '!packages/react/src/**/*.test.{browser,chromium,firefox,webkit}.{ts,tsx}'
            coverage_final_json: jsdom/coverage-final.json
          - id: utils
            name: Utils
            script: test:coverage
            file_yaml: |
              full:
                - packages/utils/{package.json,vitest.config.ts}
              diff:
                - packages/utils/src/**/*.{ts,tsx,mts}
            coverage_final_json: coverage-final.json
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Check modified files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            .github/workflows/quality.yml
            .github/workflows/unit-test.yml
            turbo.json
            package.json
            packages/workspace/package.json
            packages/workspace/src/vitest/**

      - name: Check modified files
        id: changed-module-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_yaml: ${{ matrix.file_yaml }}

      - name: Install
        if: steps.changed-files.outputs.any_changed == 'true' || steps.changed-module-files.outputs.changed_keys != ''
        uses: ./.github/composite-actions/install

      - name: Run test (full)
        if: steps.changed-files.outputs.any_changed == 'true' || steps.changed-module-files.outputs.full_any_changed == 'true'
        run: pnpm turbo run ${{ matrix.script }} --filter=./packages/${{ matrix.id }} -- --retry=3

      - name: Run test (diff)
        if: steps.changed-files.outputs.any_changed != 'true' && steps.changed-module-files.outputs.full_any_changed != 'true' && steps.changed-module-files.outputs.diff_any_changed == 'true'
        run: pnpm turbo run ${{ matrix.script }} --filter=./packages/${{ matrix.id }} -- --retry=3 --changed origin/${{ github.base_ref }}

      - name: Upload coverage
        if: steps.changed-files.outputs.any_changed == 'true' || steps.changed-module-files.outputs.changed_keys != ''
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          disable_search: true
          fail_ci_if_error: false
          files: ./packages/${{ matrix.id }}/coverage/${{ matrix.coverage_final_json }}
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          codecov_yml_path: ./codecov.yml
