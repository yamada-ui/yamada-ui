name: Test

on:
  workflow_call:
    inputs:
      TURBO_SCM_BASE:
        required: false
        type: string
    secrets:
      TURBO_TOKEN:
        required: false
      CODECOV_TOKEN:
        required: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_SCM_BASE: ${{ inputs.TURBO_SCM_BASE }}

jobs:
  test_utils:
    name: Utils - ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        env: [jsdom, chromium, firefox, webkit]
        include:
          - env: jsdom
            name: JSDOM
            diff: "!packages/utils/src/**/*.@(test.browser|test.chromium|test.firefox|test.webkit).{ts,tsx,mts}"
          - env: chromium
            name: Chromium
            diff: "!packages/utils/src/**/*.@(test|test.firefox|test.webkit).{ts,tsx,mts}"
          - env: firefox
            name: Firefox
            diff: "!packages/utils/src/**/*.@(test|test.chromium|test.webkit).{ts,tsx,mts}"
          - env: webkit
            name: Webkit
            diff: "!packages/utils/src/**/*.@(test|test.chromium|test.firefox).{ts,tsx,mts}"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Check modified files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_yaml: |
            full:
              - .github/workflows/quality.yml
              - '{turbo.json,package.json}'
              - packages/workspace/package.json
              - packages/workspace/src/vitest/**
              - packages/utils/{package.json,vitest.config.ts}
            diff:
              - packages/utils/src/**/*.{ts,tsx,mts}
              - '!packages/utils/src/**/*.stories.{ts,tsx}'
              - '${{ matrix.diff }}'

      - name: Install
        if: inputs.TURBO_SCM_BASE == '' || steps.changed-files.outputs.changed_keys != ''
        uses: ./.github/composite-actions/install

      - name: Setup Browser
        if: matrix.env != 'jsdom' && (inputs.TURBO_SCM_BASE == '' || steps.changed-files.outputs.changed_keys != '')
        run: pnpm utils exec playwright install ${{ matrix.env }} --with-deps ${{ matrix.env == 'chromium' && '--only-shell' || '' }}

      - name: Run test (full)
        if: inputs.TURBO_SCM_BASE == '' || steps.changed-files.outputs.full_any_changed == 'true'
        run: pnpm turbo run test:coverage:${{ matrix.env }} --filter=./packages/utils -- --retry=3

      - name: Run test (diff)
        if: inputs.TURBO_SCM_BASE != '' && steps.changed-files.outputs.full_any_changed != 'true' && steps.changed-files.outputs.diff_any_changed == 'true'
        run: pnpm turbo run test:coverage:${{ matrix.env }} --filter=./packages/utils -- --retry=3 --changed ${{ inputs.TURBO_SCM_BASE }}

      - name: Upload coverage
        if: inputs.TURBO_SCM_BASE == '' || steps.changed-files.outputs.changed_keys != ''
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          disable_search: true
          fail_ci_if_error: false
          files: ./packages/utils/coverage/${{ matrix.env }}/coverage-final.json
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          codecov_yml_path: ./codecov.yml
